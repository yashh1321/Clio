version: "2"
type: frontend
tech_stack:
  - TypeScript
  - Next.js 15
  - React 19
  - Tailwind CSS (shadcn/ui)
  - Supabase (PostgreSQL)
  - Tiptap Rich Text Editor
  - Radix UI
  - Lucide Icons
routes:
  - path: /login
    file: app/login/page.tsx
    auth_required: false
    description: User login page for both teachers and students
  - path: /register
    file: app/register/page.tsx
    auth_required: false
    description: User registration with role selection (student/teacher)
  - path: /dashboard
    file: app/dashboard/page.tsx
    auth_required: true
    description: Teacher dashboard - review submissions, grade essays, bulk actions
  - path: /editor
    file: app/editor/page.tsx
    auth_required: true
    description: Student essay editor with auto-save, word count, due dates
  - path: /assignments
    file: app/assignments/page.tsx
    auth_required: true
    description: Teacher assignment management (create, edit, delete)
  - path: /analytics
    file: app/analytics/page.tsx
    auth_required: true
    description: Teacher analytics dashboard with charts
  - path: /similarity
    file: app/similarity/page.tsx
    auth_required: true
    description: Plagiarism detection with side-by-side comparison
  - path: /classes
    file: app/classes/page.tsx
    auth_required: true
    description: Teacher class management
  - path: /submissions
    file: app/submissions/page.tsx
    auth_required: true
    description: Student submissions list
  - path: /profile
    file: app/profile/page.tsx
    auth_required: true
    description: User profile with editable fields
  - path: /drafts
    file: app/drafts/page.tsx
    auth_required: true
    description: Student draft essays
  - path: /student-dashboard
    file: app/student-dashboard/page.tsx
    auth_required: true
    description: Student dashboard with assignment cards and notifications
  - path: /student-analytics
    file: app/student-analytics/page.tsx
    auth_required: true
    description: Student personal performance analytics
features:
  - name: Teacher Login
    description: Login as teacher with username and password
    files:
      - app/login/page.tsx
      - app/api/auth/login/route.ts
    entry_route: /login
    user_interactions:
      - Enter username "teacher_test"
      - Enter password "teacher123"
      - Click "Sign In" button
      - Redirected to /dashboard
    api_calls:
      - method: POST
        endpoint: /api/auth/login
    auth_required: false
  - name: Student Login
    description: Login as student with username and password
    files:
      - app/login/page.tsx
      - app/api/auth/login/route.ts
    entry_route: /login
    user_interactions:
      - Enter username "student_test_new"
      - Enter password "student123"
      - Click "Sign In" button
      - Redirected to /editor
    api_calls:
      - method: POST
        endpoint: /api/auth/login
    auth_required: false
  - name: Teacher Dashboard with Filters
    description: Teacher can view submissions with enhanced filters (graded/ungraded, score range)
    files:
      - app/dashboard/page.tsx
      - app/api/submissions/route.ts
    entry_route: /dashboard
    user_interactions:
      - Click "Show Filters" to expand filter panel
      - Click ALL/GRADED/UNGRADED toggle buttons
      - Adjust integrity score range inputs
      - Search by student name or assignment title
    api_calls:
      - method: GET
        endpoint: /api/submissions
    auth_required: true
  - name: Bulk Grade Submissions
    description: Teacher selects multiple submissions and grades them at once
    files:
      - app/dashboard/page.tsx
      - app/api/grades/route.ts
    entry_route: /dashboard
    user_interactions:
      - Click checkbox on individual submissions
      - Click "Select All" to select all visible
      - Click "Bulk Grade (N)" button
      - Enter score in bulk modal
      - Enter optional feedback
      - Click "Grade N Submissions"
    api_calls:
      - method: POST
        endpoint: /api/grades
    auth_required: true
  - name: Rubric-Based Grading
    description: Teacher grades using Content/Grammar/Structure/Originality criteria
    files:
      - app/dashboard/page.tsx
      - app/api/grades/route.ts
    entry_route: /dashboard
    user_interactions:
      - Click on a submission to open detail panel
      - Click "Overall Mode" to switch to "Rubric Mode"
      - Enter scores for Content (0-25), Grammar (0-25), Structure (0-25), Originality (0-25)
      - Total auto-calculates
      - Enter feedback
      - Click "Submit Grade"
    api_calls:
      - method: POST
        endpoint: /api/grades
    auth_required: true
  - name: Student Editor with Keyboard Shortcuts
    description: Student writes essays with keyboard shortcuts for save, submit, export
    files:
      - app/editor/page.tsx
    entry_route: /editor
    user_interactions:
      - Write text in the editor
      - Press Ctrl+S to save draft
      - Press Ctrl+Enter to submit
      - Press Escape to toggle focus mode
      - View word count progress bar
      - View due date countdown
    api_calls:
      - method: POST
        endpoint: /api/submissions
      - method: POST
        endpoint: /api/drafts
    auth_required: true
  - name: Student Profile
    description: Student views and edits their profile
    files:
      - app/profile/page.tsx
      - app/api/profile/route.ts
    entry_route: /profile
    user_interactions:
      - View profile information
      - Edit full name, email, class, course
      - Click "Save Changes"
    api_calls:
      - method: GET
        endpoint: /api/profile
      - method: PUT
        endpoint: /api/profile
    auth_required: true
  - name: Similarity Comparison
    description: Teacher views plagiarism detection with expandable side-by-side text comparison
    files:
      - app/similarity/page.tsx
      - app/api/similarity/route.ts
    entry_route: /similarity
    user_interactions:
      - View flagged pairs list
      - Click on a pair to expand content comparison
      - View side-by-side text from both submissions
      - Filter by student or assignment name
    api_calls:
      - method: GET
        endpoint: /api/similarity
    auth_required: true
known_limitations:
  - issue: Student dashboard requires /api/assignments endpoint to return student-visible assignments
    location: app/student-dashboard/page.tsx
    impact: Dashboard may show empty assignment cards if student has no enrolled classes
