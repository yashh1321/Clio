version: "2"
type: backend
tech_stack:
  - python
  - fastapi
  - sqlalchemy
  - sqlite
features:
  - name: Essay Submission
    description: Submit essay with integrity checks
    files:
      - main.py
      - database.py
    endpoints:
      - method: POST
        path: /submit
        description: Submit an essay, validate WPM and paste count
        auth_required: true
        auth_header:
          name: X-API-Key
          value: clio-dev-key-DO-NOT-USE-IN-PROD
        request_schema:
          body:
            student_id: string
            assignment_title: string
            content: string
            wpm: integer
            paste_count: integer
        response_schema:
          "200":
            message: string
            score: integer
      - method: GET
        path: /submissions
        description: Retrieve all submissions
        auth_required: true
        auth_header:
          name: X-API-Key
          value: clio-dev-key-DO-NOT-USE-IN-PROD
        response_schema:
          "200": Submission[]
    depends_on: []
known_limitations: []
